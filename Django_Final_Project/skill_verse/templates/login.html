{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="text-center mb-5">

        <h1 class="fw-bold">
            Login
        </h1>

        <p class="feature-subtitle">
            Login to access SkillVerse AI.
        </p>

    </div>

    <div class="card shadow p-4">

        {% if error %}
        <script>
            alert("{{error}}");
        </script>
        {% endif %}

        {% if success %}
        <script>
            alert("{{success}}");
            window.location.href="/";
        </script>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <label class="form-label fw-bold">
                Username
            </label>

            <input
                type="text"
                name="username"
                class="form-control">

            <br>

            <label class="form-label fw-bold">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="form-control">

            <button
                type="submit"
                class="btn btn-primary mt-4 w-100">

                Login

            </button>

        </form>

    </div>

</div>

{% endblock %}
