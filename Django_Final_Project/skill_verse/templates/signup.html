{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="text-center mb-5">

        <h1 class="fw-bold">
            Create Account
        </h1>

        <p class="feature-subtitle">
            Register to access SkillVerse AI.
        </p>

    </div>

    <div class="card shadow p-4">

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-bold">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">
                    Confirm Password
                </label>

                <input
                    type="password"
                    name="confirm_password"
                    class="form-control"
                    required>
            </div>

            <button
                type="submit"
                class="btn btn-primary w-100">

                Register

            </button>

        </form>

    </div>

</div>

{% if error %}
<script>
    alert("{{ error }}");
</script>
{% endif %}

{% if success %}
<script>
    alert("{{ success }}");
    window.location.href = "/login/";
</script>
{% endif %}

{% endblock %}
