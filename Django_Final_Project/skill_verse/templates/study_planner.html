{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="text-center mb-5">

        <h1 class="fw-bold">

            AI Study Planner

        </h1>

        <p class="text-muted mt-3">

            Generate your personalized daily study plan.

        </p>

    </div>

    <!-- STUDY PLANNER CARD -->

    <div class="card shadow p-4">

        <!-- CAREER GOAL -->

        <div class="mb-4">

            <label class="form-label fw-bold">

                Select Your Goal

            </label>

            <select
                class="form-select"
                id="goal"
            >

                <option>

                    Full Stack Developer

                </option>

                <option>

                    Software Developer

                </option>

                <option>

                    AI/ML Engineer

                </option>

                <option>

                    Python Developer

                </option>

                <option>

                    Software Engineer
                    
                </option>

                <option>

                    Java Developer

                </option>

                <option>

                    Mern Stack Developer

                </option>

            </select>

        </div>

        <!-- STUDY HOURS -->

        <div class="mb-4">

            <label class="form-label fw-bold">

                Study Hours Per Day

            </label>

            <input
                type="number"
                class="form-control"
                id="hours"
                placeholder="Enter study hours"
            >

        </div>

        <!-- BUTTON -->

        <button
               class="btn btn-primary"
               onclick="generatePlan()"
        >

               Generate Study Plan

        </button>

    </div>

    <!-- OUTPUT CARD -->

    <div
        class="card shadow p-4 mt-5"
        id="plan-box"
        style="display: none;"
    >

        <h3 class="fw-bold">

            Your Study Plan

        </h3>

        <div
            id="plan-output"
            class="mt-3"
        >

        </div>

    </div>

</div>

{% endblock %}
